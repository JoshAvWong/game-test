<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fighter Simulator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #06000f;
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    #menu h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 900;
      background: linear-gradient(135deg, #cc00ff, #00ccff, #ff00aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      letter-spacing: 0.05em;
      filter: drop-shadow(0 0 20px rgba(200, 0, 255, 0.6));
    }

    .subtitle {
      color: #aa88cc;
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .fighters-preview {
      display: flex;
      gap: 60px;
      align-items: center;
      margin: 10px 0;
    }

    .fighter-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .fighter-icon {
      width: 80px;
      height: 100px;
    }

    .vs-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      color: #ff00aa;
      text-shadow: 0 0 20px #ff00aa;
    }

    .fighter-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.12em;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 32px;
      font-size: 0.78rem;
      color: #8888aa;
      text-align: left;
    }

    .controls-grid strong { color: #cc88ff; }

    .btn-start {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 14px 48px;
      background: transparent;
      border: 2px solid #cc00ff;
      color: #cc00ff;
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    }

    .btn-start::before {
      content: '';
      position: absolute;
      inset: 0;
      background: #cc00ff;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-start:hover::before { opacity: 0.15; }
    .btn-start:hover {
      box-shadow: 0 0 30px rgba(204,0,255,0.5);
      text-shadow: 0 0 10px #cc00ff;
    }

    .btn-start:active { transform: scale(0.97); }

    #game-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    canvas {
      display: block;
      border: 2px solid #440066;
      box-shadow: 0 0 60px rgba(180,0,255,0.35), 0 0 120px rgba(0,100,255,0.15);
      image-rendering: pixelated;
    }

    #controls-hint {
      font-size: 0.72rem;
      color: #554466;
      letter-spacing: 0.08em;
    }

    #back-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      background: transparent;
      border: 1px solid #330044;
      color: #664477;
      padding: 5px 18px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #back-btn:hover { color: #cc00ff; border-color: #cc00ff; }
  </style>
</head>
<body>

<!-- MENU -->
<div id="menu">
  <h1>FIGHTER SIMULATOR</h1>
  <p class="subtitle">2-Round Championship · Best of 3</p>

  <div class="fighters-preview">
    <div class="fighter-card">
      <svg class="fighter-icon" viewBox="0 0 80 100">
        <ellipse cx="40" cy="15" rx="14" ry="15" fill="#00ccff"/>
        <rect x="10" y="28" width="60" height="38" rx="4" fill="#00ccff"/>
        <rect x="10" y="62" width="22" height="38" rx="3" fill="#0055ff"/>
        <rect x="48" y="62" width="22" height="38" rx="3" fill="#0055ff"/>
        <rect x="10" y="60" width="60" height="8" rx="2" fill="#0055ff"/>
        <rect x="62" y="36" width="18" height="8" rx="4" fill="#00ccff"/>
        <circle cx="34" cy="12" r="4" fill="#003366"/>
      </svg>
      <span class="fighter-name" style="color:#00ccff">RYU</span>
    </div>
    <span class="vs-text">VS</span>
    <div class="fighter-card">
      <svg class="fighter-icon" viewBox="0 0 80 100">
        <ellipse cx="40" cy="15" rx="14" ry="15" fill="#ff4422"/>
        <rect x="10" y="28" width="60" height="38" rx="4" fill="#ff4422"/>
        <rect x="10" y="62" width="22" height="38" rx="3" fill="#aa1100"/>
        <rect x="48" y="62" width="22" height="38" rx="3" fill="#aa1100"/>
        <rect x="10" y="60" width="60" height="8" rx="2" fill="#aa1100"/>
        <rect x="0" y="36" width="18" height="8" rx="4" fill="#ff4422"/>
        <circle cx="46" cy="12" r="4" fill="#330000"/>
      </svg>
      <span class="fighter-name" style="color:#ff4422">KEN</span>
    </div>
  </div>

  <div class="controls-grid">
    <div><strong>MOVE:</strong> A / D or ←/→</div>
    <div><strong>BLOCK:</strong> S or ↓</div>
    <div><strong>JUMP:</strong> W or ↑</div>
    <div><strong>LIGHT PUNCH:</strong> Z or J</div>
    <div><strong>HEAVY PUNCH:</strong> X or K</div>
    <div><strong>SPECIAL:</strong> C or L</div>
  </div>

  <button class="btn-start" id="start-btn">FIGHT!</button>
</div>

<!-- GAME -->
<div id="game-wrap">
  <canvas id="canvas" width="1000" height="520"></canvas>
  <p id="controls-hint">WASD/Arrows: Move · Z/J: Light · X/K: Heavy · C/L: Special · S/↓: Block · R: Restart</p>
  <button id="back-btn">← Back to Menu</button>
</div>

<script type="module">
  import { Game } from './js/game.js';

  const menu = document.getElementById('menu');
  const gameWrap = document.getElementById('game-wrap');
  const canvas = document.getElementById('canvas');
  const startBtn = document.getElementById('start-btn');
  const backBtn = document.getElementById('back-btn');

  let game = null;

  function startGame() {
    menu.style.display = 'none';
    gameWrap.style.display = 'flex';
    if (game) game.destroy();
    game = new Game(canvas);
    game.start();
  }

  function backToMenu() {
    if (game) { game.destroy(); game = null; }
    gameWrap.style.display = 'none';
    menu.style.display = 'flex';
  }

  startBtn.addEventListener('click', startGame);
  backBtn.addEventListener('click', backToMenu);

  window.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'r' && game) {
      if (game.state === 'win' || game.state === 'gameover') {
        startGame();
      }
    }
  });
</script>
</body>
</html>
